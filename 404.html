<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sharp Service Delivery</title>
  <script>
    // Redirect all 404s back to index.html preserving the path for React Router
    var l = window.location;
    l.replace(l.protocol + '//' + l.host + '/Sharp-Service-Delivery-web-App/' +
      '?r=' + encodeURIComponent(l.pathname.replace('/Sharp-Service-Delivery-web-App', '') + l.search) +
      l.hash);
  </script>
</head>
<body></body>
</html>
